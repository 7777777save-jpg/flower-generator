<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>大学生标签成因分析器</title>
  <link rel="stylesheet" href="/public/styles.css">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">Cause Graph</p>
      <h1>大学生标签成因分析器</h1>
      <p class="hero-copy">
        不再统计“摆烂、内耗、社恐”这些词本身，而是直接从真实语料里提取它们背后的行为冲突、生活情境和情绪逻辑。
      </p>
      <div class="notice">
        输出结果会以“核心标签主节点 + 原因状态气泡”的方式展示，适合继续往装置、KT 板或空间叙事里转。
      </div>
    </section>

    <section class="panel control-panel">
      <div class="panel-head">
        <h2>1. 登录与检索</h2>
      </div>

      <div class="login-step-box">
        <p class="step-title">先登录你自己的账号</p>
        <p class="hint">点“点击登录”后，会自动打开你勾选平台的官网页。你在浏览器里扫码或登录完成后，再回这里点“确认登录完成”。</p>
        <div class="action-row">
          <button id="openLoginBtn" class="ghost-btn">点击登录</button>
          <button id="confirmLoginBtn" class="ghost-btn">确认登录完成</button>
        </div>
      </div>

      <label class="field">
        <span>核心标签</span>
        <textarea id="coreTagsInput" rows="3">内耗
摆烂
社恐
焦虑
熬夜
拖延</textarea>
      </label>

      <div class="field">
        <span>平台</span>
        <div class="checkbox-grid">
          <label><input type="checkbox" value="weibo" checked> 微博</label>
          <label><input type="checkbox" value="bilibili" checked> B站</label>
          <label><input type="checkbox" value="xiaohongshu" checked> 小红书</label>
          <label><input type="checkbox" value="douyin" checked> 抖音</label>
        </div>
      </div>

      <div class="inline-fields">
        <label class="field">
          <span>近多少天</span>
          <input id="sinceDaysInput" type="number" min="1" max="180" value="30">
        </label>
        <label class="field">
          <span>每个平台每标签最多抓取条数</span>
          <input id="maxItemsInput" type="number" min="4" max="30" value="10">
        </label>
        <label class="field">
          <span>每个标签提炼原因数</span>
          <input id="maxPatternsInput" type="number" min="3" max="10" value="6">
        </label>
      </div>

      <label class="field">
        <span>手动补充语料</span>
        <textarea id="manualTextInput" rows="8" placeholder="把标题、评论、正文、弹幕复制进来。系统会优先提取‘拖延但焦虑 / 想社交又怕尴尬 / 熬夜导致作息崩掉’这类原因状态表达。"></textarea>
      </label>

      <div class="action-row">
        <button id="fetchBtn" class="primary-btn">开始检索并分析</button>
        <button id="analyzeOnlyBtn" class="ghost-btn">只分析粘贴语料</button>
        <button id="clearWorkspaceBtn" class="ghost-btn">清空当前缓存</button>
      </div>

      <p id="statusText" class="status-text">等待开始。</p>
      <p id="workspaceMeta" class="hint">当前缓存：0 条语料。</p>
    </section>

    <section class="panel result-panel">
      <div class="panel-head">
        <h2>2. 标签成因图谱</h2>
      </div>
      <div id="resultWrap" class="result-wrap empty">
        <p>完成检索后，这里会生成主节点与原因气泡图谱。</p>
      </div>
    </section>
  </main>

  <script src="/public/app.js"></script>
</body>
</html>
